name: Update UniFi OS Server Version

on:
  workflow_call:
    inputs:
      platform:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      platform:
        description: Platform
        required: true
        type: choice
        options:
          - linux
          - darwin

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Validate platform
        run: |
          case "${{ inputs.platform }}" in
            linux|darwin) ;;
            *)
              echo "Unsupported platform: ${{ inputs.platform }}" >&2
              exit 1
              ;;
          esac

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Update versions
        run: ./scripts/update-version.sh --${{ inputs.platform }}

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet -- packages/unifi-os-server/*-${{ inputs.platform }}.nix; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run NixOS test suite (linux only)
        if: steps.changes.outputs.changed == 'true' && inputs.platform == 'linux'
        run: nix build .#unifi-os-server-test --no-link

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add packages/unifi-os-server/*-${{ inputs.platform }}.nix
          git commit -m "chore: update UniFi OS Server ${{ inputs.platform }} package version"
          git push
