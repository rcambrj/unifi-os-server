name: Update UniFi OS Server Version

on:
  schedule:
    - cron: "37 4 * * 5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Update Linux versions
        run: ./scripts/update-version.sh --linux

      - name: Prepare Linux package data artifact
        run: |
          mkdir -p artifact/packages/unifi-os-server
          cp packages/unifi-os-server/*-linux.nix artifact/packages/unifi-os-server/

      - uses: actions/upload-artifact@v4
        with:
          name: linux-package-data
          path: artifact

  update-darwin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Update Darwin versions
        run: ./scripts/update-version.sh --darwin

      - name: Prepare Darwin package data artifact
        run: |
          mkdir -p artifact/packages/unifi-os-server
          cp packages/unifi-os-server/*-darwin.nix artifact/packages/unifi-os-server/

      - uses: actions/upload-artifact@v4
        with:
          name: darwin-package-data
          path: artifact

  commit:
    runs-on: ubuntu-latest
    needs:
      - update-linux
      - update-darwin
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: .
          merge-multiple: true

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet -- packages/unifi-os-server/*.nix; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: DeterminateSystems/nix-installer-action@main
        if: steps.changes.outputs.changed == 'true'

      - name: Run NixOS test suite
        if: steps.changes.outputs.changed == 'true'
        run: nix build .#unifi-os-server-test --no-link

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add packages/unifi-os-server/*.nix
          git commit -m "chore: update UniFi OS Server installers"
          git push
