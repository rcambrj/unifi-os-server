name: Update version

on:
  workflow_call:
    inputs:
      platform:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      platform:
        description: Platform
        required: true
        type: choice
        options:
          - linux
          - darwin

permissions:
  contents: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Validate platform
        run: |
          case "${{ inputs.platform }}" in
            linux|darwin) ;;
            *)
              echo "Unsupported platform: ${{ inputs.platform }}" >&2
              exit 1
              ;;
          esac

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Update versions
        id: update
        run: |
          version="$(./scripts/update-version.sh --${{ inputs.platform }})"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet -- packages/unifi-os-server/*-${{ inputs.platform }}.nix; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run NixOS test suite (linux only)
        if: steps.changes.outputs.changed == 'true' && inputs.platform == 'linux'
        run: nix build -L .#unifi-os-server-test --no-link

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add packages/unifi-os-server/*-${{ inputs.platform }}.nix
          git commit -m "chore: update ${{ inputs.platform }} package version"
          git push

      - name: Create or reopen failure issue
        if: failure() && steps.update.outputs.version != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PLATFORM: ${{ inputs.platform }}
          VERSION: ${{ steps.update.outputs.version }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          title="${PLATFORM} update failed for version ${VERSION}"
          existing_issue="$(
            gh issue list \
              --state all \
              --search "$title in:title" \
              --json number,title,state \
              --jq ".[] | select(.title == \"$title\") | {number,state}" \
              | jq -s '.[0] // empty'
          )"

          if [ -n "$existing_issue" ]; then
            number="$(jq -r '.number' <<<"$existing_issue")"
            state="$(jq -r '.state' <<<"$existing_issue")"

            if [ "$state" = "CLOSED" ]; then
              gh issue reopen "$number"
              gh issue comment "$number" --body "Reopened because the automated ${PLATFORM} update failed again for version ${VERSION}.

              Run: ${RUN_URL}
              Ref: ${{ github.ref }}
              SHA: ${{ github.sha }}
              Event: ${{ github.event_name }}"
            fi

            exit 0
          fi

          gh issue create \
            --title "$title" \
            --body "The automated ${PLATFORM} update failed for version ${VERSION}.

          Run: ${RUN_URL}
          Ref: ${{ github.ref }}
          SHA: ${{ github.sha }}
          Event: ${{ github.event_name }}"
