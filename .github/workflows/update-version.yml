name: Update UniFi OS Server Version

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Fetch latest Linux installers
        id: latest
        run: |
          curl -fsSL https://download.svc.ui.com/v1/downloads/products/slugs/unifi-os-server -o api.json

          x64=$(jq -r '[.downloads[] | select(.name | test("UniFi OS Server .* for Linux \\(x64\\)$"))] | max_by(.date_published)' api.json)
          arm64=$(jq -r '[.downloads[] | select(.name | test("UniFi OS Server .* for Linux \\(arm64\\)$"))] | max_by(.date_published)' api.json)

          x64_version=$(jq -r '.version' <<<"$x64")
          x64_url=$(jq -r '.file_url' <<<"$x64")
          arm64_version=$(jq -r '.version' <<<"$arm64")
          arm64_url=$(jq -r '.file_url' <<<"$arm64")

          echo "x64_version=$x64_version" >> "$GITHUB_OUTPUT"
          echo "x64_url=$x64_url" >> "$GITHUB_OUTPUT"
          echo "arm64_version=$arm64_version" >> "$GITHUB_OUTPUT"
          echo "arm64_url=$arm64_url" >> "$GITHUB_OUTPUT"

      - name: Compute hashes and extract image versions
        id: metadata
        run: |
          nix shell nixpkgs#binwalk nixpkgs#gnutar nixpkgs#jq nixpkgs#findutils nixpkgs#coreutils -c bash -euo pipefail <<'EOF'
          fetch_metadata() {
            local arch="$1"
            local url="$2"
            local version="$3"
            local work="$(mktemp -d)"

            mkdir -p "$work/extracted"

            curl -fsSL "$url" -o "$work/installer"
            local sha256
            sha256="$(nix hash file --type sha256 --base64 "$work/installer")"

            chmod u+w "$work/installer"
            ( cd "$work" && binwalk -e ./installer >/dev/null )

            local image_tar
            image_tar="$(find "$work" -type f -name image.tar | head -n1)"
            tar -xf "$image_tar" -C "$work/extracted"

            local image_version
            image_version="$(jq -r '.[0].RepoTags[0]' "$work/extracted/manifest.json" | cut -d: -f2)"

            printf '%s_sha256=sha256-%s\n' "$arch" "$sha256" >> "$GITHUB_OUTPUT"
            printf '%s_image_version=%s\n' "$arch" "$image_version" >> "$GITHUB_OUTPUT"
            printf '%s_installer_version=%s\n' "$arch" "$version" >> "$GITHUB_OUTPUT"
          }

          fetch_metadata x64 "${{ steps.latest.outputs.x64_url }}" "${{ steps.latest.outputs.x64_version }}"
          fetch_metadata arm64 "${{ steps.latest.outputs.arm64_url }}" "${{ steps.latest.outputs.arm64_version }}"
          EOF

      - name: Update package data
        run: |
          cat > packages/unifi-os-server-image/x64.nix <<EOF
          {
            imageVersion = "${{ steps.metadata.outputs.x64_image_version }}";
            installerVersion = "${{ steps.metadata.outputs.x64_installer_version }}";
            url = "${{ steps.latest.outputs.x64_url }}";
            sha256 = "${{ steps.metadata.outputs.x64_sha256 }}";
          }
          EOF

          cat > packages/unifi-os-server-image/arm64.nix <<EOF
          {
            imageVersion = "${{ steps.metadata.outputs.arm64_image_version }}";
            installerVersion = "${{ steps.metadata.outputs.arm64_installer_version }}";
            url = "${{ steps.latest.outputs.arm64_url }}";
            sha256 = "${{ steps.metadata.outputs.arm64_sha256 }}";
          }
          EOF

      - name: Commit and push
        run: |
          if git diff --quiet -- packages/unifi-os-server-image/x64.nix packages/unifi-os-server-image/arm64.nix; then
            exit 0
          fi

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add packages/unifi-os-server-image/x64.nix packages/unifi-os-server-image/arm64.nix
          git commit -m "chore: update UniFi OS Server installers"
          git push
