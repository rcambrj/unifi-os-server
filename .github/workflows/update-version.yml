name: Update UniFi OS Server Version

on:
  # schedule:
  #   - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Fetch latest Linux installers
        id: latest
        run: |
          curl -fsSL https://download.svc.ui.com/v1/downloads/products/slugs/unifi-os-server -o api.json

          x86_64=$(jq -r '[.downloads[] | select(.name | test("UniFi OS Server .* for Linux \\(x64\\)$"))] | max_by(.date_published)' api.json)
          aarch64=$(jq -r '[.downloads[] | select(.name | test("UniFi OS Server .* for Linux \\(arm64\\)$"))] | max_by(.date_published)' api.json)

          x86_64_version=$(jq -r '.version' <<<"$x86_64")
          x86_64_url=$(jq -r '.file_url' <<<"$x86_64")
          aarch64_version=$(jq -r '.version' <<<"$aarch64")
          aarch64_url=$(jq -r '.file_url' <<<"$aarch64")

          echo "x86_64_version=$x86_64_version" >> "$GITHUB_OUTPUT"
          echo "x86_64_url=$x86_64_url" >> "$GITHUB_OUTPUT"
          echo "aarch64_version=$aarch64_version" >> "$GITHUB_OUTPUT"
          echo "aarch64_url=$aarch64_url" >> "$GITHUB_OUTPUT"

      - name: Compute hashes and extract image versions
        id: metadata
        run: |
          nix shell nixpkgs#binwalk nixpkgs#gnutar nixpkgs#jq nixpkgs#findutils nixpkgs#coreutils -c bash -euo pipefail <<'EOF'
          fetch_metadata() {
            local arch="$1"
            local url="$2"
            local version="$3"
            local work="$(mktemp -d)"

            mkdir -p "$work/extracted"

            curl -fsSL "$url" -o "$work/installer"
            local sha256
            sha256="$(nix hash file --type sha256 --base64 "$work/installer")"

            chmod u+w "$work/installer"
            ( cd "$work" && binwalk -e ./installer >/dev/null )

            local image_tar
            image_tar="$(find "$work" -type f -name image.tar | head -n1)"
            tar -xf "$image_tar" -C "$work/extracted"

            local image_version
            image_version="$(jq -r '.[0].RepoTags[0]' "$work/extracted/manifest.json" | cut -d: -f2)"

            printf '%s_sha256=sha256-%s\n' "$arch" "$sha256" >> "$GITHUB_OUTPUT"
            printf '%s_image_version=%s\n' "$arch" "$image_version" >> "$GITHUB_OUTPUT"
            printf '%s_installer_version=%s\n' "$arch" "$version" >> "$GITHUB_OUTPUT"
          }

          fetch_metadata x86_64 "${{ steps.latest.outputs.x86_64_url }}" "${{ steps.latest.outputs.x86_64_version }}"
          fetch_metadata aarch64 "${{ steps.latest.outputs.aarch64_url }}" "${{ steps.latest.outputs.aarch64_version }}"
          EOF

      - name: Update package data
        run: |
          cat > packages/unifi-os-server-image/x86_64.nix <<EOF
          {
            imageVersion = "${{ steps.metadata.outputs.x86_64_image_version }}";
            installerVersion = "${{ steps.metadata.outputs.x86_64_installer_version }}";
            url = "${{ steps.latest.outputs.x86_64_url }}";
            sha256 = "${{ steps.metadata.outputs.x86_64_sha256 }}";
          }
          EOF

          cat > packages/unifi-os-server-image/aarch64.nix <<EOF
          {
            imageVersion = "${{ steps.metadata.outputs.aarch64_image_version }}";
            installerVersion = "${{ steps.metadata.outputs.aarch64_installer_version }}";
            url = "${{ steps.latest.outputs.aarch64_url }}";
            sha256 = "${{ steps.metadata.outputs.aarch64_sha256 }}";
          }
          EOF

      - name: Commit and push
        run: |
          if git diff --quiet -- packages/unifi-os-server-image/x86_64.nix packages/unifi-os-server-image/aarch64.nix; then
            exit 0
          fi

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add packages/unifi-os-server-image/x86_64.nix packages/unifi-os-server-image/aarch64.nix
          git commit -m "chore: update UniFi OS Server installers"
          git push
