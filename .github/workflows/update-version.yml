name: Update UniFi OS Server Version

on:
  # schedule:
  #   - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Update version
        run: ./scripts/update-version.sh --push
